<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Studio | Visual Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@3.0.0/lib/index.umd.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden bg-slate-50">

    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between z-10 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg">
                <i data-lucide="blocks" class="text-white w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-800">MD Studio</h1>
        </div>
        <div class="flex gap-2">
            <button id="addBlockBtn" class="px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-800 transition-all flex items-center gap-2">
                <i data-lucide="plus" class="w-4 h-4"></i> Add Block
            </button>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <section class="w-1/2 border-r border-slate-200 flex flex-col bg-slate-100/50">
            <div class="p-4 border-b border-slate-200 bg-white">
                <h2 class="text-sm font-semibold text-slate-700 flex items-center gap-2">
                    <i data-lucide="layout-list" class="w-4 h-4"></i> Document Structure
                </h2>
            </div>
            
            <div id="builderZone" class="flex-1 p-6 overflow-y-auto custom-scrollbar space-y-4">
                </div>
        </section>

        <section class="w-1/2 flex flex-col bg-white">
            <div class="flex-1 p-8 overflow-y-auto custom-scrollbar">
                <div id="visualPreview" class="preview-content max-w-3xl mx-auto">
                    </div>
            </div>
            <div class="px-6 py-3 border-t border-slate-200 bg-white flex justify-end items-center gap-3">
                <button id="pdfBtn" class="px-3 py-2 bg-white border border-slate-200 text-slate-600 text-sm font-medium rounded-lg hover:bg-slate-50 hover:text-indigo-600 transition-all flex items-center gap-2">
                    <i data-lucide="file-down" class="w-4 h-4"></i>
                    <span>Export PDF</span>
                </button>
                <button id="copyBtn" class="px-3 py-2 bg-slate-900 border border-slate-900 text-white text-sm font-medium rounded-lg hover:bg-slate-800 transition-all flex items-center gap-2 shadow-sm">
                    <i id="copyIcon" data-lucide="copy" class="w-4 h-4"></i>
                    <span id="copyText">Copy Raw MD</span>
                </button>
            </div>
        </section>
    </main>

    <div id="commandPalette" class="hidden absolute bg-white border border-slate-200 shadow-xl rounded-xl w-64 max-h-72 overflow-y-auto z-50 py-2 custom-scrollbar">
        </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl transform translate-y-24 opacity-0 transition-all duration-300 flex items-center gap-3 z-50 pointer-events-none">
        <div class="bg-green-500/20 p-1 rounded-full">
            <i data-lucide="check" class="w-4 h-4 text-green-400"></i>
        </div>
        <span class="text-sm font-medium">Copied to clipboard!</span>
    </div>
    <div id="badgeModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl shadow-2xl p-6 w-96 max-w-full">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i data-lucide="shield" class="w-5 h-5 text-indigo-600"></i> Select Badges
            </h3>
            <div class="space-y-3 mb-6">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" id="badgeLicense" class="w-4 h-4 text-indigo-600 rounded" checked>
                    <span class="text-sm font-medium text-slate-700">MIT License</span>
                </label>
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" id="badgeNpm" class="w-4 h-4 text-indigo-600 rounded" checked>
                    <span class="text-sm font-medium text-slate-700">NPM Version</span>
                </label>
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" id="badgeBuild" class="w-4 h-4 text-indigo-600 rounded">
                    <span class="text-sm font-medium text-slate-700">Build Passing</span>
                </label>
            </div>
            <div class="flex gap-2 justify-end">
                <button id="cancelBadgeBtn" class="px-4 py-2 text-sm font-medium text-slate-500 hover:bg-slate-100 rounded-lg transition-colors">Cancel</button>
                <button id="insertBadgeBtn" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition-colors shadow-md">Insert Badges</button>
            </div>
        </div>
    </div>

    <script src="./js/state.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
